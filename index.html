<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mo NC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f7;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
      --accent: #1a1a1a;
      --input-bg: #fff;
    }

    :root.dark {
      --bg: #111110;
      --text: #e8e8e6;
      --muted: #888;
      --border: #2e2e2c;
      --accent: #e8e8e6;
      --input-bg: #1c1c1a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 24px 120px;
      width: 100%;
    }

    .hello {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
    }

    .name {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .bio {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
      max-width: 480px;
      margin-bottom: 64px;
    }

    section { margin-bottom: 64px; }

    h2 {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .projects-empty {
      font-size: 0.95rem;
      color: var(--border);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus {
      border-color: var(--text);
    }

    textarea { resize: vertical; min-height: 120px; }

    button {
      align-self: flex-start;
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.75; }

    .success {
      display: none;
      font-size: 0.9rem;
      color: #2e7d32;
      margin-top: 8px;
    }

    footer {
      margin-top: auto;
      padding: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--border);
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      align-self: unset;
    }

    .theme-toggle:hover {
      opacity: 1;
      color: var(--text);
      border-color: var(--text);
    }

    body { transition: background 0.2s, color 0.2s; }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">Dark</button>
  <main>
    <p class="hello">Hello World</p>

    <h1 class="name">Mo NC</h1>
    <p class="bio">4+ years of experience ranging from product, business analysis and strategy.</p>

    <section>
      <h2>Projects</h2>
      <div class="projects-empty">Nothing here yet — check back soon.</div>
    </section>

    <section>
      <h2>Contact</h2>
      <form id="contact-form">
        <input type="text" name="name" placeholder="Your name" required />
        <input type="email" name="email" placeholder="Your email" required />
        <textarea name="message" placeholder="Your message" required></textarea>
        <button type="submit">Send</button>
        <p class="success" id="success-msg">Message sent — I'll be in touch.</p>
      </form>
    </section>
  </main>

  <footer>mo nc</footer>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const root = document.documentElement;

    if (localStorage.getItem('theme') === 'dark') {
      root.classList.add('dark');
      toggle.textContent = 'Light';
    }

    toggle.addEventListener('click', function() {
      const isDark = root.classList.toggle('dark');
      toggle.textContent = isDark ? 'Light' : 'Dark';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = this.name.value;
      const email = this.email.value;
      const message = this.message.value;
      const mailto = `mailto:mnoorchowdhury5959@gmail.com?subject=Message from ${encodeURIComponent(name)}&body=${encodeURIComponent(message + '\n\nFrom: ' + email)}`;
      window.location.href = mailto;
      document.getElementById('success-msg').style.display = 'block';
    });
  </script>
</body>
</html>
